model:
  name: faster_rcnn
  backbone: resnet50
  pretrained: true
  num_classes: 2

data:
  dataset: multidomain_skin
  image_size: [512, 512]
  batch_size: 1
  num_workers: 0
  sources:
    - name: isic2018_dermoscopic
      image_dir: data/processed/isic2018/images
      annotation_file: data/processed/isic2018/annotations/train.json
      split_dir: data/splits/isic2018
      train_split: train
      val_split: val
      use_for_validation: true
    - name: itobos_clinical
      image_dir: data/raw/clinical_skin/itobos/images
      annotation_file: data/raw/clinical_skin/itobos/supplements/labels.json
      split_dir: data/splits/itobos
      train_split: train
      use_for_validation: false

training:
  initial_checkpoint: outputs/detection/checkpoints/best_detection.pth
  checkpoint_path: outputs/detection/checkpoints/best_detection_multidomain.pth
  history_path: outputs/detection/logs/best_detection_multidomain_training_history.csv
  epochs: 30
  lr: 0.00005
  weight_decay: 0.0005
  lr_scheduler: cosine_warm
  warmup_epochs: 2
  T_0: 10
  early_stopping_patience: 7
  augmentation: strong

evaluation:
  iou_threshold: 0.5
  confidence_threshold: 0.5
