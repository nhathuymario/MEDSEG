model:
  name: unet
  in_channels: 3
  out_channels: 1
  features: [64, 128, 256, 512]

data:
  dataset: isic2018
  image_dir: data/processed/isic2018/images
  mask_dir: data/processed/isic2018/masks
  split_dir: data/splits/isic2018
  image_size: [256, 256]
  batch_size: 8
  num_workers: 4

training:
  epochs: 100
  lr: 0.0001
  optimizer: adam
  loss: dice_bce
  lr_scheduler: cosine
  checkpoint_path: outputs/checkpoints/best_segmentation_unet_baseline.pth
  history_path: outputs/logs/best_segmentation_unet_baseline_training_history.csv

evaluation:
  threshold: 0.5
