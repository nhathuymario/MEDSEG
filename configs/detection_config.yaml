model:
  name: faster_rcnn
  backbone: resnet50
  pretrained: true
  num_classes: 2

data:
  dataset: isic2018
  image_dir: data/processed/isic2018/images
  annotation_file: data/processed/isic2018/annotations/train.json
  image_size: [512, 512]
  batch_size: 4
  num_workers: 4

training:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0005
  lr_scheduler: step
  step_size: 15

evaluation:
  iou_threshold: 0.5
  confidence_threshold: 0.5
